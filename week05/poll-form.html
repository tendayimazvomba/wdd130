<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD130 | HTML Form - User Poll</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <main>
        <h1>WDD130 | HTML Form - User Poll</h1>
        <form>
            <div class="form-item column2">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>

            <div class="form-item column2">
                <label for="useremail">Email Address:</label>
                <input type="email" id="useremail" name="useremail" required>
            </div>

            <div class="form-item column1">
                <label for="browser">What is your favorite browser?</label>
                <select name="browser" id="browser">
                    <option value="1">Chrome</option>
                    <option value="2">Edge</option>
                    <option value="3">Other</option>
                </select>
            </div>

            <div class="form-item column1">
                <label><input type="checkbox" id="pet" name="pet">Do you have a household
                    pet?</label>

                <label for="feedback">List the places you have lived</label>
                <textarea id="feedback" name="feedback" rows="4"
                  placeholder="Bulawayo, Harare, Hwange, Victoria Falls"></textarea>
            </div>

            <div class="form-item">
                <button type="submit">Submit Poll</button>
            </div>
        </form>
    </main>

    <footer>&copy; | HTML Form - User Poll Activity | Tendayi Gabriel Mazvomba</footer>

</body>

</html>
