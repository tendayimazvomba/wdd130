<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | Zambezi River White Water Rafting Adventures</title>
    <meta name="description"
      content="Experience the thrill of white water rafting on the Zambezi River below Victoria Falls in Zimbabwe with safe, unforgettable adventures for all.">
    <meta name="author" content="Tendayi Gabriel Mazvomba">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body class="home-page">
    <header>
        <img src="images/zambezi-river-wwr-logo.jpg"
          alt="Zambezi River White Water Rafting Adventures Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <!--Hero Section-->
        <section class="hero">
            <img src="images/rafting-hero.jpg" alt="White Water Rafting Adventure">
            <h1>Experience the Thrill of the Zambezi</h1>
        </section>

        <!--Newsletter Section-->
        <section class="newsletter">
            <h2>Join Our Newsletter</h2>

            <form>
                <div class="form-group">
                    <label for="username">Name:</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <button type="submit">Subscribe Now</button>

            </form>

        </section>

        <!--Call to Action Section-->
        <section class="call-to-action">
            <h2>Ready for Adventure?</h2>

            <p>Discover exciting rafting experiences and unforgettable memories.</p>

            <a href="trips.html" class="button">View Our Trips</a>
        </section>

        <!--Grid Content-->
        <section class="home-grid">
            <img src="images/" </section>
    </main>

    <footer>
        <p>&copy;2026 🌊Zambezi River White Water Rafting Adventures🌊 Tendayi Gabriel Mazvomba</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.webp" alt="Facebook">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-square.webp" alt="Instagram">
            </a>
            <a href="https://tiktok">
                <img src="images/tictok-bw.webp" alt="TikTok">
            </a>
        </nav>
    </footer>
</body>

</html>
